<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En Garde! Hyman vs Jeep Wong</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #222;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            margin: 5px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #f39c12;
            font-size: 24px;
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #aaa;
            font-weight: normal;
        }

        #scoreboard {
            display: flex;
            gap: 60px;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .p1-score { color: #3498db; }
        .p2-score { color: #e74c3c; }

        #gameContainer {
            position: relative;
            border: 4px solid #fff;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        canvas {
            background: #111;
            display: block;
        }

        #controls-ui {
            display: flex;
            gap: 40px;
            margin-top: 15px;
            background: #333;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 13px;
        }

        .control-column {
            text-align: left;
        }

        kbd {
            background: #555;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #777;
            box-shadow: 0 2px 0 #000;
        }

        #msg {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
            text-align: center;
            width: 100%;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h1>En Garde!</h1>
    <h2>Foil Rules: Torso Only & Right of Way (Priority) Applies</h2>
    
    <div id="scoreboard">
        <span class="p1-score">Hyman: <span id="p1-score-val">0</span></span>
        <span class="p2-score">Jeep Wong: <span id="p2-score-val">0</span></span>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="300"></canvas>
        <div id="msg">Press ENTER to Start Touch</div>
    </div>

    <div id="controls-ui">
        <div class="control-column" style="color: #3498db;">
            <strong>Hyman (Left):</strong><br>
            <kbd>A</kbd> Advance | <kbd>D</kbd> Retreat<br>
            <kbd>W</kbd> Lunge | <kbd>S</kbd> Parry
        </div>
        <div style="border-left: 1px solid #555;"></div>
        <div class="control-column" style="color: #e74c3c;">
            <strong>Jeep Wong (Right):</strong><br>
            <kbd>←</kbd> Advance | <kbd>→</kbd> Retreat<br>
            <kbd>↑</kbd> Lunge | <kbd>↓</kbd> Parry
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const p1ScoreEl = document.getElementById('p1-score-val');
const p2ScoreEl = document.getElementById('p2-score-val');
const msgEl = document.getElementById('msg');

let p1Score = 0;
let p2Score = 0;
let gameState = 'READY'; 

const pisteY = 240; 

const keys = {
    a: false, d: false, w: false, s: false,
    arrowleft: false, arrowright: false, arrowup: false, arrowdown: false
};

window.addEventListener('keydown', (e) => {
    // Prevent default scrolling actions for gaming keys entirely
    if (e.key === ' ' || e.key === 'Enter' || e.key.startsWith('Arrow')) {
        e.preventDefault();
    }

    const k = e.key.toLowerCase();
    if (k in keys) {
        keys[k] = true;
    }
    
    // Use ENTER to progress the game state
    if (e.key === 'Enter' && gameState !== 'PLAYING') {
        resetTouch();
    }
});

window.addEventListener('keyup', (e) => {
    const k = e.key.toLowerCase();
    if (k in keys) keys[k] = false;
});

class Fencer {
    constructor(x, side, color, name) {
        this.name = name;
        this.startX = x;
        this.x = x;
        this.side = side; 
        this.color = color;
        this.width = 24;
        this.height = 65;
        
        this.state = 'IDLE'; 
        this.stateTimer = 0;
        this.speed = 4;
        this.weaponLength = 50;
        this.hasPriority = false;
    }

    reset() {
        this.x = this.startX;
        this.state = 'IDLE';
        this.stateTimer = 0;
        this.hasPriority = false;
    }

    update() {
        if (this.stateTimer > 0) {
            this.stateTimer--;
            if (this.stateTimer === 0) {
                this.state = 'IDLE';
                this.hasPriority = false; 
            }
        }
    }

    getWeaponTip() {
        let length = this.weaponLength;
        if (this.state === 'LUNGING') length += 40;
        if (this.state === 'PARRYING') length -= 15;
        return this.x + (this.width / 2) * this.side + (length * this.side);
    }
    
    getWeaponY() {
        if (this.state === 'PARRYING') return pisteY - this.height + 15;
        if (this.state === 'LUNGING') return pisteY - this.height + 40;
        return pisteY - this.height + 35;
    }

    getTorsoBounds() {
        return {
            top: pisteY - this.height + 15,
            bottom: pisteY - 5,
            left: this.x - this.width / 2,
            right: this.x + this.width / 2
        };
    }

    getHeadBounds() {
        return {
            top: pisteY - this.height - 25,
            bottom: pisteY - this.height + 15,
            left: this.x - 12,
            right: this.x + 12
        };
    }
}

const p1 = new Fencer(220, 1, '#3498db', 'Hyman');
const p2 = new Fencer(580, -1, '#e74c3c', 'Jeep Wong');

function resetTouch() {
    p1.reset();
    p2.reset();
    gameState = 'PLAYING';
    msgEl.innerHTML = '';
}

function haltRound(resultText, winner) {
    gameState = 'HALT';
    if (winner === 'p1') {
        p1Score++;
        p1ScoreEl.textContent = p1Score;
    } else if (winner === 'p2') {
        p2Score++;
        p2ScoreEl.textContent = p2Score;
    }
    msgEl.innerHTML = `${resultText}<br><span style='font-size:18px; color: #fff;'>Press ENTER for Next Touch</span>`;
}

function handleInputs() {
    // Hyman
    if (p1.state === 'IDLE') {
        if (keys.a) p1.x -= p1.speed;
        if (keys.d) p1.x += p1.speed;
        
        if (keys.w) {
            p1.state = 'LUNGING';
            p1.stateTimer = 25;
            if (!p2.hasPriority) p1.hasPriority = true;
        } else if (keys.s) {
            p1.state = 'PARRYING';
            p1.stateTimer = 18;
        }
    }

    // Jeep Wong
    if (p2.state === 'IDLE') {
        if (keys.arrowleft) p2.x -= p2.speed;
        if (keys.arrowright) p2.x += p2.speed;
        
        if (keys.arrowup) {
            p2.state = 'LUNGING';
            p2.stateTimer = 25;
            if (!p1.hasPriority) p2.hasPriority = true;
        } else if (keys.arrowdown) {
            p2.state = 'PARRYING';
            p2.stateTimer = 18;
        }
    }
}

function checkFoilRules() {
    const p1TipX = p1.getWeaponTip();
    const p1TipY = p1.getWeaponY();
    const p2TipX = p2.getWeaponTip();
    const p2TipY = p2.getWeaponY();

    let p1HitsTorso = false;
    let p1HitsHead = false;
    let p2HitsTorso = false;
    let p2HitsHead = false;

    // --- PARRY MECHANICS ---
    if (p1.state === 'LUNGING' && p2.state === 'PARRYING') {
        if (p1TipX >= p2.x - p2.width && p1TipX <= p2.x + p2.width) {
            p1.state = 'IDLE';
            p1.hasPriority = false;
            p2.hasPriority = true; 
            p1.x -= 40;
            return;
        }
    }
    if (p2.state === 'LUNGING' && p1.state === 'PARRYING') {
        if (p2TipX <= p1.x + p1.width && p2TipX >= p1.x - p1.width) {
            p2.state = 'IDLE';
            p2.hasPriority = false;
            p1.hasPriority = true; 
            p2.x += 40;
            return;
        }
    }

    // --- HIT DETECTION ---
    if (p1.state === 'LUNGING' && p1.x < p2.x) {
        const t = p2.getTorsoBounds();
        const h = p2.getHeadBounds();
        if (p1TipX >= t.left && p1TipX <= t.right && p1TipY >= t.top && p1TipY <= t.bottom) p1HitsTorso = true;
        if (p1TipX >= h.left && p1TipX <= h.right && p1TipY >= h.top && p1TipY <= h.bottom) p1HitsHead = true;
    }

    if (p2.state === 'LUNGING' && p2.x > p1.x) {
        const t = p1.getTorsoBounds();
        const h = p1.getHeadBounds();
        if (p2TipX <= t.right && p2TipX >= t.left && p2TipY >= t.top && p2TipY <= t.bottom) p2HitsTorso = true;
        if (p2TipX <= h.right && p2TipX >= h.left && p2TipY >= h.top && p2TipY <= h.bottom) p2HitsHead = true;
    }

    // --- RESOLVE FOIL PRIORITY LOGIC ---
    if (p1HitsTorso && p2HitsTorso) {
        if (p1.hasPriority && !p2.hasPriority) {
            haltRound("<span style='color:#3498db;'>Touché Hyman!</span><br><span style='font-size:16px;'>Simultaneous hits, Hyman had Right of Way.</span>", 'p1');
        } else if (p2.hasPriority && !p1.hasPriority) {
            haltRound("<span style='color:#e74c3c;'>Touché Jeep Wong!</span><br><span style='font-size:16px;'>Simultaneous hits, Jeep Wong had Right of Way.</span>", 'p2');
        } else {
            haltRound("<span style='color:#aaa;'>Simultaneous Action!</span><br><span style='font-size:16px;'>No priority established. No point.</span>", 'none');
        }
        return;
    }

    if (p1HitsTorso) {
        if (p1.hasPriority || !p2.hasPriority) {
            haltRound("<span style='color:#3498db;'>Touché Hyman!</span>", 'p1');
        } else {
            haltRound("<span style='color:#aaa;'>Attack Countered!</span><br><span style='font-size:16px;'>Hyman hit, but Jeep Wong held Right of Way.</span>", 'none');
        }
    } else if (p2HitsTorso) {
        if (p2.hasPriority || !p1.hasPriority) {
            haltRound("<span style='color:#e74c3c;'>Touché Jeep Wong!</span>", 'p2');
        } else {
            haltRound("<span style='color:#aaa;'>Attack Countered!</span><br><span style='font-size:16px;'>Jeep Wong hit, but Hyman held Right of Way.</span>", 'none');
        }
    } else if (p1HitsHead || p2HitsHead) {
        haltRound("<span style='color:#95a5a6;'>WHITE LIGHT - Off Target</span><br><span style='font-size:16px;'>Foil targets are torso only. No point.</span>", 'none');
    }
}

function update() {
    if (gameState === 'PLAYING') {
        handleInputs();

        p1.update();
        p2.update();

        p1.x = Math.max(20, Math.min(canvas.width - 20, p1.x));
        p2.x = Math.max(20, Math.min(canvas.width - 20, p2.x));

        if (p1.x > p2.x - 15) p1.x = p2.x - 15;

        checkFoilRules();
    }
}

function drawFencer(f) {
    ctx.save();
    
    let bodyX = f.x - f.width / 2;
    let bodyY = pisteY - f.height;
    let currentWidth = f.width;
    
    if (f.state === 'LUNGING') {
        currentWidth = f.width * 1.5;
        bodyX = f.side === 1 ? f.x - f.width/2 : f.x - currentWidth + f.width/2;
    }

    if (f.hasPriority && gameState === 'PLAYING') {
        ctx.fillStyle = 'rgba(241, 196, 15, 0.4)';
        ctx.fillRect(f.x - 15, bodyY - 35, 30, 6);
    }

    ctx.fillStyle = f.color;
    ctx.fillRect(bodyX, bodyY + 15, currentWidth, f.height - 15);
    ctx.fillStyle = 'rgba(236, 240, 241, 0.3)';
    ctx.fillRect(bodyX + 2, bodyY + 15, currentWidth - 4, f.height - 20);

    ctx.fillStyle = '#fff';
    ctx.fillRect(bodyX, pisteY - 5, currentWidth, 5); 

    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(f.x, bodyY - 2, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#444';
    ctx.fillRect(f.x + (f.side === 1 ? 2 : -9), bodyY - 8, 7, 12);

    ctx.strokeStyle = '#cccccc';
    ctx.lineWidth = 2;
    ctx.beginPath();
    
    let handX = f.x + (f.width / 2) * f.side;
    let handY = pisteY - f.height + 35;
    let tipX = f.getWeaponTip();
    let tipY = f.getWeaponY();

    ctx.moveTo(handX, handY);
    ctx.lineTo(tipX, tipY);
    ctx.stroke();

    ctx.fillStyle = '#95a5a6';
    ctx.beginPath();
    ctx.arc(handX, handY, 5, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#555';
    ctx.fillRect(0, pisteY, canvas.width, 10);
    ctx.fillStyle = '#7f8c8d';
    ctx.fillRect(100, pisteY, 5, 10);
    ctx.fillRect(canvas.width - 100, pisteY, 5, 10);
    ctx.fillRect(canvas.width / 2, pisteY, 2, 10);

    drawFencer(p1);
    drawFencer(p2);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
